language = "zh"

[config]
model = "deepseek/deepseek-v4-pro"
custom_model_max_tokens = 128000

[pr_reviewer]
enable_extra_extensions = true

[pr_reviewer.extra_instructions]
review = """
请进行彻底审查，重点关注：正确性、安全性、错误处理、边界情况和 POSIX 便携性。
注意：完全忽略所有关于缩进、空格、括号换行等格式化（Formatting）问题。
不要针对变量命名风格提出建议，除非涉及严重的逻辑歧义。
只有在发现实质性问题或严重隐患时才进行评论，避免琐碎的表层建议。
"""

[pr_reviewer.ignore]
glob = ["**/*.md"]