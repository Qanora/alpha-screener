name: PR-Agent Reviewer (DeepSeek V4 Pro via OpenAI-compatible)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_job:
    if: >
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request != null &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (contains(github.event.comment.body, '/review') || contains(github.event.comment.body, '/describe') || contains(github.event.comment.body, '/improve'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run PR-Agent
        uses: Codium-ai/pr-agent@0bd56c0508504c718cc03d504cd4ceb6725ba3c7
        env:
          # PR-Agent 内部检查的是 OPENAI_KEY（非标准命名）
          OPENAI_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_BASE: "https://api.deepseek.com"

          # 模型名称必须严格加上前缀，强制声明使用 openai 兼容格式请求
          CONFIG.MODEL: "openai/deepseek-v4-pro"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"

          # 添加 synchronize 到 PR_ACTIONS，使 PR-Agent 处理 PR 更新事件
          GITHUB_ACTION_CONFIG.PR_ACTIONS: "opened,reopened,synchronize,ready_for_review"

          # 保持 GitHub Token 和其他业务配置
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_REVIEWER.AUTOMATIC_REVIEW_APPROVAL: "true"
          PR_REVIEWER.LANGUAGE: "zh"