name: PR-Agent Reviewer (DeepSeek V4 Pro via Anthropic)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run PR-Agent
        uses: Codium-ai/pr-agent@main
        env:
          ANTHROPIC_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_BASE: "https://api.deepseek.com/anthropic"
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          CONFIG.MODEL: "deepseek-v4-pro"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
          PR_REVIEWER.AUTOMATIC_REVIEW_APPROVAL: "true"
          PR_REVIEWER.LANGUAGE: "zh"