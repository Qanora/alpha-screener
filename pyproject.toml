[project]
name = "alpha-screener"
version = "0.1.0"
description = "AI-Native quantitative strategy validation platform for US equities"
requires-python = ">=3.11"
dependencies = [
    # 上游 AI Agent 框架（git+commit 锁定）
    "tradingagents @ git+https://github.com/TauricResearch/TradingAgents.git@61522e103e61601c553b4544abcd53fa7ebf9f1d",

    # 核心数值与数据处理
    "numpy>=1.26,<2.0",
    "polars>=0.20",
    "pandas>=2.1",
    "pyarrow>=14",

    # 机器学习 / 聚类（V1.5 起使用）
    "scikit-learn>=1.4",
    "hdbscan>=0.8.33",
    "faiss-cpu>=1.7",

    # 回测
    "backtrader>=1.9.78",

    # 数据源
    "yfinance>=0.2.40",
    "requests>=2.31",
    "httpx>=0.26",

    # 调度与存储
    "apscheduler>=3.10",
    "sqlalchemy>=2.0",
    "alembic>=1.13",

    # 系统支持
    "tenacity>=8.2",
    "psutil>=5.9",
    "pydantic>=2.5",
    "pydantic-settings>=2.2",
    "python-dotenv>=1.0",
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "ruff>=0.2",
    "mypy>=1.8",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
