[pr_reviewer]
# 开启自动批准
automatic_review_approval = true

# 自动批准的严格门槛："Low" 表示只有当 PR 几乎没风险时才给过
automatic_review_approval_threshold = "Low"

# 开启代码行内评论
inline_code_comments = true

# 使用中文回复
language = "zh"

[pr_reviewer.extra_instructions]
review = """
请进行彻底审查，重点关注：正确性、安全性、错误处理、边界情况和 POSIX 便携性。
注意：完全忽略所有关于缩进、空格、括号换行等格式化（Formatting）问题。
不要针对变量命名风格提出建议，除非涉及严重的逻辑歧义。
只有在发现实质性问题或严重隐患时才进行评论，避免琐碎的表层建议。
"""

[pr_reviewer.ignore]
glob = ["**/*.md"]